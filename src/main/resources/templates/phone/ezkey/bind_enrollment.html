<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle}">Enrollment - Bind</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; background:#f2f2f2; padding:1.5rem; }
    .app-shell { width: 380px; height: 780px; border-radius: 36px; background:#0a0a0a; color:#f5f5f7; position: relative; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,.35); }
    .status-bar { position:absolute; top: 12px; left:0; right:0; padding: 0 16px; display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:.9rem; }
    .content { position:absolute; top: 52px; left:0; right:0; bottom: 0; display:flex; flex-direction:column; }
    .header { padding: 16px; }
    .title { margin:0; font-size: 1.25rem; }
    .form-container { flex:1; padding: 16px; overflow-y: auto; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
    .form-input { 
      width: 100%; 
      padding: 12px 14px; 
      border-radius: 14px; 
      background: rgba(255,255,255,.06); 
      border: 1px solid rgba(255,255,255,.1); 
      color: #fff; 
      font-size: 1rem;
      box-sizing: border-box;
    }
    .form-input:focus { 
      outline: none; 
      border-color: #0d6efd; 
      background: rgba(255,255,255,.08); 
    }
    .form-input::placeholder { color: #888; }
    .btn-primary { 
      width: 100%; 
      padding: 12px 14px; 
      border-radius: 14px; 
      background: #0d6efd; 
      color: #fff; 
      border: none; 
      font-size: 1rem; 
      cursor: pointer; 
    }
    .btn-primary:hover { background: #0b5ed7; }
    .btn-secondary { 
      width: 100%; 
      padding: 12px 14px; 
      border-radius: 14px; 
      background: rgba(255,255,255,.1); 
      color: #fff; 
      border: none; 
      font-size: 1rem; 
      cursor: pointer; 
      margin-top: 12px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,.15); }
    .alert { 
      padding: 12px 14px; 
      border-radius: 14px; 
      margin-bottom: 20px; 
      font-size: 0.9rem; 
    }
    .alert-success { 
      background: rgba(40, 167, 69, 0.2); 
      border: 1px solid rgba(40, 167, 28, 0.3); 
      color: #28a745; 
    }
    .alert-danger { 
      background: rgba(220, 53, 69, 0.2); 
      border: 1px solid rgba(220, 53, 69, 0.3); 
      color: #dc3545; 
    }
    .info-box { 
      padding: 12px 14px; 
      border-radius: 14px; 
      background: rgba(255,255,255,.06); 
      margin-bottom: 20px; 
      font-size: 0.85rem; 
      color: #ccc; 
    }
    .side-exit { position: absolute; right: -14px; top: 40%; width: 8px; height: 120px; background:#333; border-radius: 4px; cursor: pointer; display: block; text-decoration: none; color: inherit; }
    .btn-secondary-link {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 12px;
      display: block;
      text-align: center;
      text-decoration: none;
      box-sizing: border-box;
    }
    .btn-secondary-link:hover { background: rgba(255,255,255,.15); color: #fff; }
  </style>
</head>
<body>
  <div class="app-shell" data-testid="demo-device-bind-enrollment">
    <div class="status-bar">
      <div>Ezkey</div>
      <div>9:41</div>
    </div>
    <div class="content">
      <div class="header">
        <h1 class="title" th:text="${enrollmentName ?: 'Enrollment #' + enrollmentId}">Enrollment Name</h1>
        <div class="text-muted" style="font-size:.85rem; opacity:.8;">Complete the enrollment process</div>
      </div>
      <div class="form-container">
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success" data-testid="demo-device-bind-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" data-testid="demo-device-bind-error" th:text="${error}"></div>
        
        <!-- Integration Information -->
        <div th:if="${integrationName}" class="info-box">
          <div style="display: flex; align-items: center; margin-bottom: 8px;">
            <img th:if="${integrationLogo}" th:src="${integrationLogo}" alt="Integration Logo" 
                 style="width: 32px; height: 32px; border-radius: 6px; margin-right: 12px;">
            <div>
              <strong th:text="${integrationName}">Demo Integration</strong>
              <div th:if="${integrationDescription}" style="font-size: 0.8rem; color: #999; margin-top: 2px;" 
                   th:text="${integrationDescription}">Demo integration for testing purposes</div>
            </div>
          </div>
          <div th:if="${enrollmentName != null and enrollmentName != integrationName}" style="font-size: 0.8rem; color: #888; margin-top: 4px;">
            <strong>Enrollment:</strong> <span th:text="${enrollmentName}">Enrollment Name</span>
          </div>
        </div>
        
        <!-- Bind Information -->
        <div th:if="${enrollmentProofToken}" class="info-box">
          <strong>Enrollment ProofToken:</strong> <span th:text="${enrollmentProofToken}"></span>
        </div>
        
        <!-- Verify Form -->
        <form th:if="${success}" action="/phone/ezkey/enrollment/verify" method="post" data-testid="demo-device-verify-enrollment-form">
          <input type="hidden" name="enrollmentId" th:value="${enrollmentId}">
          <input type="hidden" name="enrollmentProofToken" th:value="${enrollmentProofToken}">
          <div class="form-group">
            <label for="challengeResponse" class="form-label">Challenge Code</label>
            <input type="text" id="challengeResponse" name="challengeResponse" class="form-input" placeholder="Enter challenge code" required data-testid="demo-device-enroll-challenge-input">
            <div style="font-size: 0.8rem; color: #888; margin-top: 4px;">
              Enter the challenge code shown in the demo console
            </div>
          </div>
          <button type="submit" class="btn-primary" data-testid="demo-device-verify-enrollment-submit">Verify Enrollment</button>
        </form>
        
        <a th:href="@{/phone/ezkey}" class="btn-secondary-link" data-testid="demo-device-bind-back">Back to Enrollments</a>
      </div>
    </div>
    <a th:href="@{/phone/ezkey}"
       class="side-exit"
       title="Back to enrollments"
       aria-label="Back to enrollments"
       data-testid="demo-device-exit-side"></a>
  </div>
</body>
</html>
