<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle}">Enrollment - Success</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; background:#f2f2f2; padding:1.5rem; }
    .app-shell { width: 380px; height: 780px; border-radius: 36px; background:#0a0a0a; color:#f5f5f7; position: relative; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,.35); }
    .status-bar { position:absolute; top: 12px; left:0; right:0; padding: 0 16px; display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:.9rem; }
    .content { position:absolute; top: 52px; left:0; right:0; bottom: 0; display:flex; flex-direction:column; }
    .header { padding: 16px; }
    .title { margin:0; font-size: 1.25rem; }
    .success-container { flex:1; padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .success-icon { 
      width: 80px; 
      height: 80px; 
      border-radius: 50%; 
      background: #28a745; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 2rem; 
      margin-bottom: 20px; 
    }
    .success-message { 
      font-size: 1.1rem; 
      margin-bottom: 12px; 
      color: #28a745; 
    }
    .enrollment-id { 
      font-size: 0.9rem; 
      color: #ccc; 
      margin-bottom: 30px; 
    }
    .btn-primary { 
      width: 100%; 
      padding: 12px 14px; 
      border-radius: 14px; 
      background: #0d6efd; 
      color: #fff; 
      border: none; 
      font-size: 1rem; 
      cursor: pointer; 
      display: block;
      text-align: center;
      text-decoration: none;
      box-sizing: border-box;
    }
    .btn-primary:hover { background: #0b5ed7; color: #fff; }
    .side-exit { position: absolute; right: -14px; top: 40%; width: 8px; height: 120px; background:#333; border-radius: 4px; cursor: pointer; display: block; text-decoration: none; color: inherit; }
  </style>
</head>
<body>
  <div class="app-shell" data-testid="demo-device-verify-success">
    <div class="status-bar">
      <div>Ezkey</div>
      <div>9:41</div>
    </div>
    <div class="content">
      <div class="header">
        <h1 class="title">Enrollment Complete</h1>
      </div>
      <div class="success-container">
        <div class="success-icon">✓</div>
        <div class="success-message" th:text="${success}">Enrollment verified successfully!</div>
        <div class="enrollment-id">Enrollment #<span th:text="${enrollmentId}">123</span> is now active</div>
        <a class="btn-primary" th:href="@{/phone/ezkey}" data-testid="demo-device-back-to-enrollments">Back to Enrollments</a>
      </div>
    </div>
    <a th:href="@{/phone/ezkey}"
       class="side-exit"
       title="Back to enrollments"
       aria-label="Back to enrollments"
       data-testid="demo-device-exit-side"></a>
  </div>
</body>
</html>
