<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle}">Authentication</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; background:#f2f2f2; padding:1.5rem; }
    .app-shell { width: 380px; height: 780px; border-radius: 36px; background:#0a0a0a; color:#f5f5f7; position: relative; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,.35); }
    .status-bar { position:absolute; top: 12px; left:0; right:0; padding: 0 16px; display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:.9rem; }
    .content { position:absolute; top: 52px; left:0; right:0; bottom: 0; display:flex; flex-direction:column; }
    .header { padding: 20px 16px 8px 16px; }
    .title { margin:0; font-size: 1.25rem; }
    .card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); color:#fff; }
    .integration-info { 
      display: flex; 
      align-items: center; 
      margin-bottom: 16px; 
      padding: 12px 14px; 
      border-radius: 14px; 
      background: rgba(255,255,255,.06); 
      border: 1px solid rgba(255,255,255,.08); 
    }
    .integration-logo { 
      width: 48px; 
      height: 48px; 
      border-radius: 8px; 
      margin-right: 12px; 
      background: rgba(255,255,255,.1); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 1.2rem; 
      color: #ccc; 
    }
    .integration-details { flex: 1; }
    .integration-name { font-weight: 600; margin-bottom: 4px; }
    .integration-description { font-size: 0.85rem; color: #ccc; line-height: 1.2; }
    .message { 
      padding: 12px 14px; 
      border-radius: 14px; 
      margin: 16px; 
      font-size: 0.9rem; 
      text-align: center;
    }
    .message-info { 
      background: rgba(13, 110, 253, 0.2); 
      border: 1px solid rgba(13, 110, 253, 0.3); 
      color: #0d6efd; 
    }
    .message-error { 
      background: rgba(220, 53, 69, 0.2); 
      border: 1px solid rgba(220, 53, 69, 0.3); 
      color: #dc3545; 
    }
    .btn-primary { 
      width: calc(100% - 32px); 
      padding: 12px 14px; 
      border-radius: 14px; 
      background: #0d6efd; 
      color: #fff; 
      border: none; 
      font-size: 1rem; 
      cursor: pointer; 
      margin: 8px 16px;
      display: block;
      text-align: center;
      text-decoration: none;
      box-sizing: border-box;
    }
    .btn-primary:hover { background: #0b5ed7; color: #fff; }
    .side-exit { position: absolute; right: -14px; top: 40%; width: 8px; height: 120px; background:#333; border-radius: 4px; cursor: pointer; display: block; text-decoration: none; color: inherit; }
  </style>
</head>
<body>
  <div class="app-shell" data-testid="demo-device-auth-idle">
    <div class="status-bar">
      <div>Ezkey</div>
      <div>9:41</div>
    </div>
    <div class="content">
      <div class="header">
        <h1 class="title">Authentication</h1>
      </div>
      
      <!-- Integration Information -->
      <div class="px-3">
        <div class="integration-info">
          <div class="integration-logo">
            <img th:if="${integrationLogo}" th:src="${integrationLogo}" alt="Integration Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 6px;">
            <span th:unless="${integrationLogo}">🔐</span>
          </div>
          <div class="integration-details">
            <div class="integration-name" th:text="${enrollmentName ?: integrationName ?: 'Enrollment #' + enrollmentId}">Enrollment Name</div>
            <div class="integration-description" th:text="${integrationDescription ?: 'Authentication required'}">Integration description</div>
          </div>
        </div>
      </div>
      
      <!-- Messages — aria-live helps AT / automation snapshot tools notice idle ↔ pending transitions after reload -->
      <div th:if="${message}" class="message message-info" data-testid="demo-device-auth-message" th:text="${message}" aria-live="polite" aria-atomic="true">No pending authentication requests</div>
      <div th:if="${error}" class="message message-error" data-testid="demo-device-auth-error" th:text="${error}" aria-live="polite" aria-atomic="true">Error message</div>
      
      <!-- Action Buttons -->
      <div class="mt-auto">
        <a class="btn-primary"
           th:href="@{'/phone/ezkey/enrollments/' + ${enrollmentId} + '/auth'}"
           data-testid="demo-device-auth-recheck">Check for Authentication Requests</a>
        <a class="btn-primary" th:href="@{/phone/ezkey}" style="background: rgba(255,255,255,.1);" data-testid="demo-device-back-to-enrollments">Back to Enrollments</a>
      </div>
    </div>
    <a href="/phone/ezkey"
       class="side-exit"
       title="Back to enrollments"
       aria-label="Back to enrollments"
       data-testid="demo-device-auth-back"></a>
  </div>
</body>
</html>
